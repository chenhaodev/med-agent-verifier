- id: TD_call_001
  kind: needs_tool
  expected_action: call
  question: 'API 描述：SubmitMicrobiologyCultureRequest（微生物培养申请提交）描述：用于临床医生提交微生物培养及药敏试验的电子申请。系统接收患者信息、标本详情、临床诊断等关键数据后，会自动生成唯一的检验条码，并将申请信息录入检验信息系统（LIS），等待标本送达检验科进行处理。输入参数：patient_id
    (string，必填)：患者唯一标识（如住院号）specimen_type (string，必填)：标本类型（"blood"=血液, "sputum"=痰液,
    "urine"=尿液, "wound_secretion"=伤口分泌物, "csf"=脑脊液）collection_site (string，选填)：采集部位（当标本类型为"wound_secretion"等时必填）collection_time
    (string，必填)：标本采集时间（ISO 8601 格式，例如："2023-10-27T10:30:00Z"）clinical_diagnosis (string，必填)：临床初步诊断test_items
    (list，必填)：检验项目列表（"culture"=细菌培养, "susceptibility"=药敏试验）is_urgent (boolean，选填，默认为
    false)：是否为急诊申请输出：{  "request_id": "",  // 申请单唯一 ID  "barcode_id": "",  // 标本容器上需贴的条码号  "status":
    "",  // 申请状态（如：submitted, received_by_lab）  "message": ""  // 提示信息（如：申请成功，请尽快送检）}用户问题：给住院号
    89757 的病人张伟开个急诊的痰培养加药敏。他是重症肺炎，今天早上 9 点刚留的痰，赶紧送检。'
  source: MedCallAPI#41
  validity: verified
