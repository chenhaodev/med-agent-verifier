  question: "API 描述：RoutePrenatalScreeningReport（产前筛查报告流转）\n描述：根据产前筛查报告（如唐氏筛查、无创 DNA）的关键信息，自动将其流转至指定的系统或人员。系统能根据报告结果的风险等级（如低风险、高风险）执行不同的流转规则，例如：低风险报告仅归档至电子病历（EHR）并通知开单医生；高风险报告除了归档和通知外，还需立即推送给高危门诊团队，并自动创建遗传咨询预约任务。\n\
    输入参数：\nreport_id (string，必填)：报告的唯一标识符。\npatient_id (string，必填)：患者的唯一标识符。\nreport_type\
    \ (string，必填)：报告类型（\"down_screening\"=唐氏筛查，\"nipt\"=无创 DNA）。\nresult_status (string，必填)：结果风险等级（\"\
    low_risk\"=低风险，\"high_risk\"=高风险）。\nordering_physician_id (string，必填)：开单医生的工号。\n\
    report_content_url (string，必填)：报告 PDF 或结构化内容的访问链接。\nnotes (string，选填)：附加说明。\n\
    输出：\n{\n  \"status\": \"\",  // 处理状态（\"success\" 或 \"failure\"）\n  \"message\"\
    : \"\",  // 处理结果消息\n  \"routing_details\": [  // 具体的流转路径详情\n    {\n      \"destination_type\"\
    : \"\",  // 目标类型（如 \"ehr\", \"physician_inbox\", \"referral_queue\"）\n      \"\
    destination_id\": \"\",  // 目标标识（如病历号、医生工号、队列名称）\n      \"status\": \"\"  // 该路径的流转状态\n\
    \    }, ...\n  ],\n  \"timestamp\": \"\"  // 操作时间戳\n}\n用户问题：\n产科检验室刚出的唐氏筛查报告，报告编号\
    \ DS20240520008，患者张丽（ID: 320100199003081234），结果为高风险。开单医生是产科的王医生（工号 00897），请把报告分发到他那里，并自动生成一个高危门诊的转诊申请。报告文件在内网的\
    \ /reports/DS20240520008.pdf。"
  source: MedCallAPI#136
  validity: verified
