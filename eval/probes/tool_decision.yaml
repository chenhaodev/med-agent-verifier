- id: TD_call_004
  kind: needs_tool
  expected_action: call
  question: 'API 描述：CreateImagingExamOrder（创建影像检查申请）描述：为指定患者创建一项影像学检查申请单，系统将根据申请信息自动校验医保适用性、生成检查唯一码，并推送至影像科（RIS）系统进行排队预约。输入参数：patient_id
    (string，必填)：患者唯一标识（如住院号、门诊号）exam_code (string，必填)：检查项目代码（例如："US-CARDIAC" 表示心脏彩超，"CT-CHEST"
    表示胸部 CT）exam_name (string，必填)：检查项目标准名称clinical_diagnosis (string，必填)：临床初步诊断symptoms_and_signs
    (string，必填)：主要症状及体征is_urgent (boolean，必填)：是否为急诊申请（true=是，false=否）requesting_doctor_id
    (string，必填)：开单医生工号requesting_department (string，必填)：开单科室名称输出：{  "success": true,  //
    操作是否成功  "order_id": "",  // 申请单唯一 ID  "message": "",  // 系统返回信息  "estimated_wait_time":
    "" // 预计等待时间（仅急诊或特定项目提供）}用户问题：给心内科 32 床的病人李伟（住院号：ZY01002358）开一个急诊心脏彩超。他最近三天一直说胸闷、气短，初步诊断是急性心衰可能，我工号是
    1024，王医生。'
  source: MedCallAPI#44
  validity: verified
