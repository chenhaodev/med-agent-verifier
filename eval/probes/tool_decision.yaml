- id: TD_call_013
  kind: needs_tool
  expected_action: call
  question: 'API 描述：ExecutePCAPumpOrder（镇痛泵医嘱执行）描述：根据已开立的镇痛泵使用医嘱，关联具体患者、设备和药物参数，执行启动镇痛泵的操作。此操作将记录执行人、时间，并激活设备监控。输入参数：order_id
    (string，必填)：电子医嘱的唯一标识符。patient_id (string，必填)：患者的住院号或唯一身份标识。device_sn (string，必填)：镇痛泵设备的序列号。drug_name
    (string，必填)：泵内装载的镇痛药物通用名。concentration (number，必填)：药物浓度。unit (string，必填)：浓度单位（如："mg/mL"）。background_infusion_rate
    (number，必填)：背景持续输注速率（单位：mL/h）。pca_bolus_dose (number，必填)：单次自控给药剂量（单位：mL）。lockout_interval
    (number，必填)：自控给药后的锁定时间（单位：分钟）。max_dose_limit_4h (number，必填)：4小时内最大给药总量限制（单位：mL）。operator_id
    (string，必填)：执行操作的护士或麻醉师的工号。输出：{  "success": true,  // 操作是否成功  "execution_id":
    "", // 本次执行操作的唯一记录ID  "message": "" // 返回信息，如成功提示或错误详情}用户问题：护士站，我是麻醉科王医生。请给 3
    床的李四（住院号 2024052003）执行术后镇痛泵医嘱。医嘱号是 YZ987654321。我们用的是序列号为 PCA-SN-11223344 的镇痛泵，里面是
    0.02mg/mL 的芬太尼。参数设置如下：背景剂量 1mL/h，单次按压剂量 0.5mL，锁定时间 15 分钟，4 小时限量 10mL。执行护士是张静，工号
    N00789。'
  source: MedCallAPI#24
  validity: verified
