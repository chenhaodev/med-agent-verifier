- id: TD_call_009
  kind: needs_tool
  expected_action: call
  question: 'API 描述：CreateConsultationRequest（会诊申请创建）描述：为指定患者发起一则科室间的会诊申请。系统将根据申请信息，创建会诊任务，并通知被邀科室的相应医师。输入参数：patient_id
    (string，必填)：患者的唯一住院号或ID。requesting_department (string，必填)：发起申请的科室名称。requesting_doctor
    (string，必填)：发起申请的医生姓名。consultation_department (string，必填)：需要会诊的科室名称。urgency_level
    (string，必填)：紧急程度（"routine"=平会诊, "urgent"=急会诊）。consultation_reason (object，必填)：会诊事由，包含病情摘要。  chief_complaint
    (string, 必填): 主要症状或问题。  history_of_present_illness (string, 必填): 简要病史和诊疗经过。  key_findings
    (string, 必填): 关键体格检查或辅助检查发现。specific_questions (list，必填)：需要会诊科室解答的具体问题列表。输出：{  "request_id":
    "",  // 本次会诊申请的唯一ID  "status": "",  // 申请的当前状态（例如："pending_acceptance"）  "message":
    ""  // 系统提示信息}用户问题：急诊科王医生，帮我为 3 床的患儿（住院号 2024052001）发起一个到小儿科的急会诊。这个孩子 5 岁，持续高热
    5 天，体温最高 40.2℃，身上有皮疹，眼结膜充血，颈部淋巴结肿大。我怀疑是川崎病，想请小儿科明确诊断，并指导一下后续的 IVIG（静脉注射免疫球蛋白）治疗方案。麻烦尽快。'
  source: MedCallAPI#60
  validity: verified
