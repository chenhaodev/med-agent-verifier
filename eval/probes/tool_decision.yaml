  question: 'API 描述：RequestICUBed（ICU床位申请）描述：为危重患者提交ICU床位申请。系统会校验患者信息，评估病情严重程度，并将申请推送至ICU进行审核。输入参数：patient_id
    (string，必填)：患者的唯一住院号requesting_department (string，必填)：申请科室（例如：“急诊科”、“心内科”）requesting_doctor_id
    (string，必填)：申请医生的工号diagnosis (string，必填)：导致需要转入ICU的主要诊断vital_signs (object，必填)：关键生命体征对象，包含：heart_rate
    (number): 心率（次/分）respiratory_rate (number): 呼吸频率（次/分）blood_pressure (string):
    血压（例如：“85/50 mmHg”）oxygen_saturation (number): 指脉氧饱和度（%）apache_ii_score (number，非必填)：APACHE
    II评分，用于评估病情严重程度urgency_level (string，必填)：紧急程度（"critical"=危急, "urgent"=紧急）special_requirements
    (list，非必填)：特殊要求（例如：["negative_pressure_room", "dialysis_machine"]）输出：{  "request_id":
    "",  // 申请单的唯一标识符  "status": "",  // 申请的初始状态，如 "pending_review"（待审核）  "message":
    ""  // 系统返回的确认信息}用户问题：我是急诊科的李医生，工号 10235。病人张三，住院号 HOS_12345678，诊断为急性重症胰腺炎，目前心率
    130 次/分，呼吸 28 次/分，血压掉到 85/50 mmHg，指脉氧饱和度只有 90%。病情危急，需要立刻转入 ICU。APACHE II 评分 25
    分。麻烦紧急处理。'
