- id: TD_call_006
  kind: needs_tool
  expected_action: call
  question: 'API 描述：PrepareHerbalGranules（中药颗粒调配执行）描述：根据电子处方ID、患者ID、药师ID和调剂窗口信息，执行中药颗粒的调配操作。系统会自动从库存中扣减相应药品，记录调配详情（包括药品批号），并计算费用。如果库存不足或处方无效，将返回错误信息。输入参数：prescription_id
    (string，必填)：电子中药处方唯一标识符。patient_id (string，必填)：患者唯一标识符。pharmacist_id (string，必填)：执行操作的药师工号。dispensing_window
    (string，必填)：调剂窗口编号（例如："window_03"）。输出：{  "dispensing_id": "",  // 本次调配操作的唯一ID  "status":
    "",  // 调配状态 ("success" = 成功, "failed_inventory_shortage" = 库存不足, "failed_invalid_prescription"
    = 无效处方)  "items": [    {      "herb_name": "",  // 药材名称      "herb_code": "",  //
    药材编码      "required_grams": 0,  // 处方要求克数      "dispensed_grams": 0,  // 实际调配克数      "lot_number":
    ""  // 药品批号，用于溯源    }, ...  ],  "total_cost": 0.0,  // 总费用（元）  "message": ""  //
    提示信息，尤其在失败时说明原因}用户问题：我是中药房药师王明（工号 PHARM789），现在在 3 号调剂窗口，需要为病人张三（ID: PAT0012345）调配电子处方
    CF202405200812 的中药颗粒，请执行操作。'
  source: MedCallAPI#99
  validity: verified
