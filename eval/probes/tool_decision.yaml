- id: TD_call_007
  kind: needs_tool
  expected_action: call
  question: 'API 描述：RequestAnestheticDrugDispensing（麻醉药品调配申请）描述：用于为特定手术申请和调配特殊麻醉药品。系统将核验手术信息、患者信息、医师资质及药品库存，生成调配指令或驳回理由。输入参数：surgery_id
    (string，必填)：手术安排的唯一标识ID patient_id (string，必填)：患者的唯一住院号或ID anes_doctor_id (string，必填)：主麻医师的工号或唯一ID
    drug_name (string，必填)：申请的麻醉药品标准名称（如：remifentanil, propofol）dosage (string，必填)：申请剂量及单位（如："2mg",
    "100ml"）justification (string，可选)：特殊情况下的申请理由输出：{ "success": true, // 申请是否成功 "dispensing_id":
    "DISP-AN-20240521-3301", // 成功后的调配单号 "message": "", // 系统返回信息，成功或失败原因 "details":
    { // 更多细节 "pickup_location": "", // 领取地点 "pickup_window": "" // 领取时间窗口 }}用户问题：我是麻醉科医生张伟，工号是
    M0345。现在需要为住院号为 H7890123 的患者准备手术用药，手术单号是 S202405210930A。请帮我申领 2mg 的盐酸瑞芬太尼。'
  source: MedCallAPI#86
  validity: verified
