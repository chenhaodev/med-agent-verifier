- id: TD_call_003
  kind: needs_tool
  expected_action: call
  question: 'API 描述：SubmitAdverseTransfusionReactionReport（输血不良事件报告提交）描述：用于临床人员提交输血过程中或输血后发生的不良事件报告。系统接收报告后，将自动生成唯一报告ID，记录事件详情，并根据事件严重等级，自动流转至输血科、医务科等相关部门进行审核与处理。输入参数：patient_id
    (string，必填)：患者住院号或唯一标识。reporter_id (string，必填)：报告人（医生/护士）的工号。reporter_name (string，必填)：报告人姓名。transfusion_id
    (string，必填)：输注血制品的唯一码（血袋码）。reaction_time (string，必填)：不良反应发生时间（格式：YYYY-MM-DDTHH:mm:ss）。reaction_type
    (string，必填)：不良反应类型（"allergic_reaction"=过敏反应, "febrile_non_hemolytic"=非溶血性发热, "hemolytic"=急性溶血反应,
    "circulatory_overload"=循环超负荷）。symptoms (list，必填)：临床症状描述列表（例如：["fever", "rash",
    "dyspnea", "chills"]）。severity (string，必填)：事件严重等级（"mild"=轻度, "moderate"=中度, "severe"=重度）。actions_taken
    (list，必填)：已采取的紧急措施列表（例如：["stopped_transfusion", "administered_antihistamine",
    "notified_physician"]）。notes (string，选填)：补充说明。输出：{  "success": true,  // 是否提交成功  "report_id":
    "",  // 系统生成的唯一报告ID  "message": "",  // 提交结果反馈信息  "notified_departments": [] //
    已通知的部门列表}用户问题：我是护士王琳，工号 N0345。刚刚在给住院号为 ZY01004567 的病人输注血袋编号为 A231205001 的红细胞悬液时，病人出现了寒战和皮疹。输血时间大概是今天下午
    3 点半，我已经立即停止了输血，并通知了值班医生。初步判断是过敏反应，程度中等。请帮忙记录并上报这个输血不良事件。'
  source: MedCallAPI#146
  validity: verified
