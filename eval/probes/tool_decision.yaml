- id: TD_call_008
  kind: needs_tool
  expected_action: call
  question: 'API 描述：ExecuteClinicalOrder（执行临床医嘱）描述：用于护士或医生执行并记录一项具体的临床医嘱，如生命体征测量、药物注射、治疗操作等。系统将记录执行人、执行时间、具体结果及任何相关备注。输入参数：order_id
    (string，必填)：待执行医嘱的唯一标识符。patient_id (string，必填)：患者的唯一住院号或ID。executor_id (string，必填)：执行操作的医护人员工号。execution_time
    (string，必填)：医嘱执行的精确时间，格式为 ISO 8601（例如："2024-05-21T14:00:00+08:00"）。results (list，必填)：医嘱执行的结果列表，每个结果为一对象。  -
    item_code (string，必填)：测量或操作项的标准化代码（如 "T" 代表体温，"P" 代表脉率）。  - value (number/string，必填)：测量或操作的结果值。  -
    unit (string，必填)：结果值的单位（如 "°C"，"次/分"）。  - method (string，可选)：测量或操作的方法（如 "axillary"
    代表腋下测温）。notes (string，可选)：与本次执行相关的额外备注信息。输出：{  "status": "",  // 执行状态 ("success"
    或 "error")  "message": "",  // 提示信息  "record_id": ""  // 本次执行记录的唯一ID}用户问题：护士张三报告，已为住院号为
    89757 的患者李四执行了今天下午 2 点的体温监测医嘱（医嘱号 T-20240520-015），测量结果为腋下体温 38.5 摄氏度，患者自述有轻微畏寒。'
  source: MedCallAPI#18
  validity: verified
