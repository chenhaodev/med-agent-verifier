- id: TD_call_002
  kind: needs_tool
  expected_action: call
  question: 'API 描述：SchedulePulmonaryFunctionTest（肺功能检查预约）描述：为指定患者预约一项或多项肺功能检查，记录临床诊断目的，并可设定紧急程度和检查前注意事项。系统将返回预约凭证和最终给到患者的完整检查须知。输入参数：patient_id
    (string，必填)：患者唯一标识（如住院号、门诊号）test_items (list，必填)：检查项目编码列表（"spirometry"=常规通气功能,
    "dlco"=弥散功能, "lung_volume"=肺容积测定）clinical_diagnosis (string，必填)：申请检查的临床诊断或目的is_urgent
    (boolean，必填)：是否为紧急检查（true=是, false=否）pre_test_instructions (list，可选)：额外的检查前医嘱（例如：["停用支气管扩张剂4小时"]）输出：{  "success":
    true, // 预约是否成功  "appointment_id": "", // 预约号  "appointment_time": "", // 预约时间（若无法立即确定，则返回提示信息）  "location":
    "", // 检查地点  "patient_instructions": "", // 整合后的完整患者须知  "error_message": null
    // 失败时的错误信息}用户问题：给住院号为 ZY01002345 的病人张三开一个肺功能检查，主要是评估他哮喘的控制情况，查常规通气功能和弥散功能就行了。不用太急，就常规安排。另外，记得提醒他检查前
    12 小时停用所有短效支气管扩张剂。'
  source: MedCallAPI#45
  validity: verified
