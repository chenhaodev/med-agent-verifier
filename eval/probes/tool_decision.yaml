- id: TD_call_000
  kind: needs_tool
  expected_action: call
  question: 'API 描述：RequestPreoperativeBed（术前待床位申请）描述：为已确定手术日期的患者，由主治医生或科室秘书提交入院待床申请。系统将根据申请信息和床位资源，将患者加入相应科室的待床队列，并返回申请状态。输入参数：patient_id
    (string，必填)：患者唯一标识（如住院号或身份证号）。admitting_department (string，必填)：拟收治入院的科室名称（例如：“心血管外科”、“神经外科”）。scheduled_surgery_date
    (string，必填)：预定手术日期，格式为 YYYY-MM-DD。surgery_name (string，必填)：主要手术名称。requesting_physician_id
    (string，必填)：申请医生的工号。urgency_level (string，可选)：紧急程度（“routine”=常规，“urgent”=紧急），默认为
    “routine”。bed_type_preference (string，可选)：床位类型偏好（“single”=单人间，“double”=双人间，“general”=普通多人间），不保证满足。输出：{  "request_id":
    "",  // 申请的唯一 ID  "status": "",  // 申请当前状态（如："submitted", "waitlisted", "approved"）  "estimated_wait_days":
    null, // 预计等待天数（整数），若无法估计则为 null  "message": ""  // 结果消息}用户问题：我是骨科的李医生，工号是 10234。病人张伟，住院号是
    H00128957，已经安排在下周五（2024-05-24）进行“全髋关节置换术”，需要给他申请一个术前床位，他希望能住双人间的。'
  source: MedCallAPI#119
  validity: verified
