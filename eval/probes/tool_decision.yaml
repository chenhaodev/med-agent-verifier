- id: TD_call_012
  kind: needs_tool
  expected_action: call
  question: 'API 描述：CreateTransferHandoverReport（创建转科交接报告）描述：为转科患者生成并流转电子交接报告。系统将根据传入的患者信息、转出/转入科室、交接内容，自动从电子病历系统（EMR）中提取必要的临床数据，生成标准化报告，并推送至目标科室的医护工作站。输入参数：patient_id
    (string，必填)：患者唯一住院号。source_department_id (string，必填)：转出科室的唯一ID。destination_department_id
    (string，必填)：转入科室的唯一ID。transfer_reason (string，必填)：转科的主要临床原因和目的。initiating_doctor_id
    (string，必填)：发起转科申请的医生ID。urgency_level (string，选填)：紧急程度，可选值为 "routine"（常规）或 "urgent"（紧急），默认为
    "routine"。handover_content (object，选填)：补充交接内容，若不提供，则系统完全自动从EMR抓取。可包含：diagnosis
    (string): 补充诊断信息。nursing_notes (string): 特别护理嘱托。key_lab_results (list): 需要特别强调的检验检查结果。输出：{  "success":
    true,  // 操作是否成功  "report_id": "TR-20240521-0034",  // 生成的报告唯一ID  "message": "已成功为患者XX创建转往XX科的交接报告，并已发送至目标科室工作站。"}用户问题：立刻给心内科CCU病房的张伟（住院号：330125）办转科，他急性心梗已经完成介入治疗，现在病情稳定了，准备转到普通心血管内科病房继续康复治疗。我是主治医生李明（工号
    D5873），这件事比较急，你帮我把交接报告发过去。'
  source: MedCallAPI#140
  validity: verified
