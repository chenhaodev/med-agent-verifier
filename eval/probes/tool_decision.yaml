  expected_action: call
  question: 'API 描述：PrepareChemotherapyDrugs（化疗药物调配准备）描述：供静脉药物配置中心（PIVAS）使用，根据已审核的医嘱信息，为指定患者准备化疗药物。系统将自动计算体表面积（BSA）及各药物精确剂量，并生成包含溶媒、终浓度、输注时间及安全警示的调配指令和标签信息。输入参数：patient_id
    (string，必填)：患者唯一住院号。order_id (string，必填)：本次化疗的医嘱唯一标识。protocol_name (string，必填)：化疗方案名称（例如："FOLFOX6",
    "R-CHOP"）。patient_height_cm (number，必填)：患者身高（厘米）。patient_weight_kg (number，必填)：患者体重（公斤）。special_instructions
    (string，选填)：医师特殊说明，如剂量调整百分比等。requesting_department (string，必填)：申请调配的科室。输出：{  "preparation_id":
    "",  // 本次调配任务的唯一ID  "patient_info": {    "id": "",  // 患者住院号    "name": "", //
    患者姓名（脱敏）    "bsa_m2": 0.0 // 计算得出的体表面积（平方米）  },  "drugs_to_prepare": [    {      "drug_name":
    "",  // 药物名称      "calculated_dose_mg": 0.0,  // 计算后的精确剂量（毫克）      "diluent":
    "",  // 推荐溶媒      "final_volume_ml": 0,  // 溶解后最终液体体积（毫升）      "infusion_time_minutes":
    0  // 建议输注时长（分钟）    }, ...  ],  "label_content": "", // 用于打印在输液袋上的标签内容（文本）  "safety_warnings":
    [] // 安全操作警示列表}用户问题：请为住院号为 8975421 的患者林先生准备化疗药物。医嘱号是 20240520-CHEM-011，采用的是 FOLFOX6
    方案。患者最新的身高是 175cm，体重 70kg。医生特别嘱咐，本次奥沙利铂剂量减少 15%。我们是肿瘤内科一病区。'
