- id: TD_call_005
  kind: needs_tool
  expected_action: call
  question: 'API 描述：RouteFollowUpReport（随访报告流转）描述：将指定的随访结果报告（如影像、检验、病理报告）根据预设规则或指定接收人进行流转，并记录流转状态。支持设置紧急程度和附加备注。输入参数：report_id
    (string，必填)：待流转报告的唯一标识符。report_type (string，必填)：报告类型（"imaging"=影像, "lab"=检验, "pathology"=病理）。patient_id
    (string，必填)：报告所属患者的唯一标识符。primary_physician_id (string，必填)：患者主治医生的工号，为主要接收人。recipients
    (list，可选)：其他接收人的工号列表（如会诊医生、上级医生）。urgency_level (string，可选)：紧急程度（"normal"=普通, "urgent"=紧急），默认为
    "normal"。notes (string，可选)：随报告一同发送的附加备注信息。输出：{  "flow_id": "",  // 本次流转操作的唯一 ID  "status":
    "",  // 流转状态 ("success", "failed")  "message": "",  // 结果描述信息  "recipients_confirmed":
    [] // 确认已发送的接收人列表}用户问题：请把患者李小明（ID: P12345678）刚出的胸部 CT 随访复查报告（报告号：IMG20240521009）立刻发给他的主治医生王伟（工号:
    D9876），另外抄送一份给胸外科的赵主任（工号: D1234），跟他们说一下，报告显示结节有增大趋势，需要尽快安排会诊。'
  source: MedCallAPI#151
  validity: verified
