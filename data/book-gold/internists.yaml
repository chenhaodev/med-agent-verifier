  - 出现症状（腹痛/发热/黄疸）时需就医
  must_warn:
  - 若出现右上腹剧痛伴发热/黄疸需立即就医
  source_refs:
  - 西氏内科学精要
  must_not:
  - 建议立即手术切除所有无症状胆囊结石
