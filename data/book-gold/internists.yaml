  expected_topics:
  - 液体摄入限制1500-2000ml
  - 包括汤、粥、水果中水分
  - 每天称体重监测
  # doctor 临床要点版：教材未给通用液体阈值，故评在容量管理原则而非具体毫升数与患教细节上
  doctor_expected_topics:
  - 容量管理：限钠（约2g/d）+ 适度液体限制
  - 每日称重监测容量状态
  - 体重短期快速增加（如3天≥2kg）提示液体潴留
  must_warn:
  - 3天体重增加2kg就医
