  source_refs:
  - 西氏内科学精要
  must_not:
  - 建议完全卧床不动以避免跌倒
  doctor_must_have_tags:
  - 证据等级
- id: RHEU_GOUT_02
  mode: patient
  question: 爸爸痛风好几年了，医生说要长期控制尿酸，平时饮食该怎么注意？
  expected_domain:
  - endocrine:gout
  expected_topics:
  - 减少高嘌呤食物（贝类、动物内脏）摄入
  - 避免含果糖饮料和酒精（尤其啤酒）
  - 多喝水每日至少1.5升促进尿酸排泄
  - 低脂乳制品有助于降低尿酸
